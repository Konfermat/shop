{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Sweety {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <div class="content header-flex">
            <a href="/" class="logo">SWEETY</a>
            <nav class="nav-links">
                <a href="{% url 'shop:category_list' %}">Каталог</a>
                <a href="{% url 'shop:promotions' %}" style="color: var(--primary-color)">Акции</a>
                <a href="{% url 'cart:cart_detail' %}">Карета</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'accounts:profile' %}">Профиль</a>
                    <a href="{% url 'accounts:logout' %}">Выйти</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}">Войти</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="container">
        {% blok content %}{% endblock %}
    </main>    
    <footer style="background: var(--secondary-color)">
        <p&copy; {% now 'Y' %}>Все права защищены</p>
    </footer>
</body>
</html>
